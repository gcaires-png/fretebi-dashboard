name: Deploy FreteBI + Moita Rev1 to GitHub Pages

on:
  push:
    branches:
      - claude/logistics-analyst-moita-rev1-7ejr53
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare site
        run: |
          mkdir -p _site
          cp index.html _site/index.html
          cp moita-rev1.html _site/moita-rev1.html
          cp painel-gestao.html _site/painel-gestao.html
          cp insurance-rules.json _site/insurance-rules.json 2>/dev/null || true
          cp -r cte-drafts _site/cte-drafts 2>/dev/null || true

      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
